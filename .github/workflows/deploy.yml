# Deploy to project-agml.github.io on push to main.
# Requires secret: ACTIONS_DEPLOY_KEY (private key; add matching public key as deploy key in project-agml.github.io)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout AgML-Hub
        uses: actions/checkout@v4

      - name: Checkout AgML
        uses: actions/checkout@v4
        with:
          repository: Project-AgML/AgML
          path: agml-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          AGML_SOURCE: ${{ github.workspace }}/agml-source
          BASE_URL: '/'
        run: |
          npm ci
          npm run build

      - name: Deploy to project-agml.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: Project-AgML/project-agml.github.io
          publish_dir: frontend/dist
          publish_branch: main
          force_orphan: true
