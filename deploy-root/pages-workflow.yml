# Copy this file to your project-agml.github.io repo as .github/workflows/deploy.yml
# Then enable GitHub Pages (Settings → Pages → Source: GitHub Actions)

name: Deploy from AgML-Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone AgML-Hub
        run: git clone --depth 1 https://github.com/Project-AgML/AgML-Hub.git agml-hub

      - name: Clone AgML
        run: git clone --depth 1 https://github.com/Project-AgML/AgML.git agml-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agml-hub/frontend/package-lock.json

      - name: Build
        run: |
          cd agml-hub/frontend
          npm ci
          npm run build
        env:
          AGML_SOURCE: ${{ github.workspace }}/agml-source
          BASE_URL: /

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: agml-hub/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
